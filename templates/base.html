<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}🚀 Crypto Pro - پلتفرم معاملاتی پیشرفته{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================
                   RESET & BASE
                ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: rgba(10, 14, 26, 0.85);
            --bg-secondary: rgba(17, 25, 39, 0.85);
            --bg-card: rgba(26, 35, 53, 0.7);
            --bg-card-hover: rgba(31, 42, 66, 0.8);
            --border-color: rgba(42, 58, 90, 0.4);
            --text-primary: #e6edf3;
            --text-secondary: #8b9bb5;
            --text-muted: #5a6f8c;
            --accent-green: #00d4aa;
            --accent-red: #ff6b6b;
            --accent-orange: #ffa94d;
            --accent-blue: #58a6ff;
            --accent-purple: #bc8cff;
            --accent-pink: #ff6b9d;
            --accent-cyan: #00d4ff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --glow: 0 0 60px rgba(88, 166, 255, 0.08);
            --gradient-main: linear-gradient(135deg, #0a0e1a 0%, #1a2335 50%, #0a0e1a 100%);
            --gradient-gold: linear-gradient(135deg, #ffd700, #ff6b00);
        }
        
        body {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            position: relative;
            background: #0a0e1a;
        }
        
        /* ========================================
                   نورهای پویا و متحرک
                ======================================== */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: #0a0e1a;
            overflow: hidden;
        }
        
        /* نورهای اصلی با حرکت دایره‌ای */
        .bg-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            will-change: transform;
        }
        
        .bg-light:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #58a6ff;
            animation: lightFloat1 25s ease-in-out infinite alternate;
        }
        
        .bg-light:nth-child(2) {
            width: 450px;
            height: 450px;
            background: #bc8cff;
            animation: lightFloat2 30s ease-in-out infinite alternate;
        }
        
        .bg-light:nth-child(3) {
            width: 400px;
            height: 400px;
            background: #ff6b9d;
            animation: lightFloat3 20s ease-in-out infinite alternate;
        }
        
        .bg-light:nth-child(4) {
            width: 350px;
            height: 350px;
            background: #00d4ff;
            animation: lightFloat4 28s ease-in-out infinite alternate;
        }
        
        .bg-light:nth-child(5) {
            width: 380px;
            height: 380px;
            background: #ffa94d;
            animation: lightFloat5 22s ease-in-out infinite alternate;
        }
        
        .bg-light:nth-child(6) {
            width: 300px;
            height: 300px;
            background: #00d4aa;
            animation: lightFloat6 26s ease-in-out infinite alternate;
        }
        
        /* انیمیشن‌های حرکت نورها */
        @keyframes lightFloat1 {
            0% { top: 5%; left: 5%; transform: scale(1); }
            25% { top: 10%; left: 80%; transform: scale(1.2); }
            50% { top: 60%; left: 85%; transform: scale(0.9); }
            75% { top: 80%; left: 10%; transform: scale(1.3); }
            100% { top: 5%; left: 5%; transform: scale(1); }
        }
        
        @keyframes lightFloat2 {
            0% { top: 70%; right: 5%; transform: scale(1); }
            25% { top: 80%; right: 80%; transform: scale(1.3); }
            50% { top: 20%; right: 85%; transform: scale(0.8); }
            75% { top: 5%; right: 15%; transform: scale(1.2); }
            100% { top: 70%; right: 5%; transform: scale(1); }
        }
        
        @keyframes lightFloat3 {
            0% { top: 40%; left: 40%; transform: scale(1); }
            33% { top: 20%; left: 70%; transform: scale(1.4); }
            66% { top: 70%; left: 20%; transform: scale(0.7); }
            100% { top: 40%; left: 40%; transform: scale(1); }
        }
        
        @keyframes lightFloat4 {
            0% { top: 10%; right: 30%; transform: scale(1); }
            50% { top: 60%; right: 60%; transform: scale(1.5); }
            100% { top: 10%; right: 30%; transform: scale(1); }
        }
        
        @keyframes lightFloat5 {
            0% { bottom: 20%; left: 20%; transform: scale(1); }
            50% { bottom: 60%; left: 70%; transform: scale(1.3); }
            100% { bottom: 20%; left: 20%; transform: scale(1); }
        }
        
        @keyframes lightFloat6 {
            0% { top: 50%; right: 50%; transform: scale(1); }
            50% { top: 20%; right: 20%; transform: scale(1.6); }
            100% { top: 50%; right: 50%; transform: scale(1); }
        }
        
        /* ذرات نورانی کوچک */
        .bg-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: particleFloat 20s infinite alternate;
            will-change: transform;
        }
        
        @keyframes particleFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translate(
                    calc(var(--tx, 100px)),
                    calc(var(--ty, -100px))
                ) scale(0);
                opacity: 0;
            }
        }
        
        /* ========================================
                   اسکرول بار
                ======================================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(10, 14, 26, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple));
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--accent-purple), var(--accent-pink));
        }
        
        /* ========================================
                   انیمیشن‌ها
                ======================================== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(88, 166, 255, 0.1); }
            50% { box-shadow: 0 0 40px rgba(88, 166, 255, 0.2); }
        }
        
        .animate-fade { animation: fadeInUp 0.6s ease forwards; }
        .animate-slide { animation: slideInRight 0.5s ease forwards; }
        
        /* ========================================
                   کانتینر اصلی
                ======================================== */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.5s ease;
        }
        
        /* ========================================
                   دکمه‌ها
                ======================================== */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Vazirmatn', sans-serif;
            box-shadow: 0 4px 25px rgba(88, 166, 255, 0.25);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 40px rgba(88, 166, 255, 0.4);
        }
        
        .btn-primary:hover::before { opacity: 1; }
        
        .btn-success { background: linear-gradient(135deg, var(--accent-green), #00b894); }
        .btn-danger { background: linear-gradient(135deg, var(--accent-red), #e17055); }
        .btn-warning { background: linear-gradient(135deg, var(--accent-orange), #fdcb6e); }
        .btn-gold { background: var(--gradient-gold); color: #0a0e1a; }
        
        /* ========================================
                   کارت‌های شیشه‌ای
                ======================================== */
        .glass-card {
            background: rgba(26, 35, 53, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(42, 58, 90, 0.3);
            border-radius: 16px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .glass-card:hover {
            border-color: rgba(88, 166, 255, 0.3);
            box-shadow: var(--glow), var(--shadow);
            transform: translateY(-2px);
        }
        
        /* ========================================
                   وضعیت‌ها
                ======================================== */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulseGlow 2s infinite;
        }
        
        .status-dot.green { background: var(--accent-green); box-shadow: 0 0 15px rgba(0, 212, 170, 0.4); }
        .status-dot.yellow { background: var(--accent-orange); box-shadow: 0 0 15px rgba(255, 169, 77, 0.4); }
        .status-dot.red { background: var(--accent-red); box-shadow: 0 0 15px rgba(255, 107, 107, 0.4); }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- ===== نورهای پویا و متحرک ===== -->
    <div class="bg-container">
        <div class="bg-light"></div>
        <div class="bg-light"></div>
        <div class="bg-light"></div>
        <div class="bg-light"></div>
        <div class="bg-light"></div>
        <div class="bg-light"></div>
        
        <!-- ذرات نورانی -->
        <div class="bg-particle" style="top:5%; left:10%; --tx:120px; --ty:-80px; animation-delay:0s;"></div>
        <div class="bg-particle" style="top:15%; left:85%; --tx:-100px; --ty:90px; animation-delay:-2s;"></div>
        <div class="bg-particle" style="top:70%; left:5%; --tx:150px; --ty:-60px; animation-delay:-4s;"></div>
        <div class="bg-particle" style="top:80%; left:92%; --tx:-130px; --ty:70px; animation-delay:-6s;"></div>
        <div class="bg-particle" style="top:40%; left:50%; --tx:80px; --ty:-120px; animation-delay:-8s;"></div>
        <div class="bg-particle" style="top:55%; left:30%; --tx:-60px; --ty:100px; animation-delay:-10s;"></div>
        <div class="bg-particle" style="top:25%; left:70%; --tx:100px; --ty:-90px; animation-delay:-12s;"></div>
        <div class="bg-particle" style="top:90%; left:60%; --tx:-80px; --ty:-70px; animation-delay:-14s;"></div>
        <div class="bg-particle" style="top:10%; left:45%; --tx:200px; --ty:50px; animation-delay:-16s;"></div>
        <div class="bg-particle" style="top:65%; left:75%; --tx:-150px; --ty:-40px; animation-delay:-18s;"></div>
        <div class="bg-particle" style="top:35%; left:15%; --tx:90px; --ty:-130px; animation-delay:-20s;"></div>
        <div class="bg-particle" style="top:75%; left:40%; --tx:-70px; --ty:110px; animation-delay:-22s;"></div>
        <div class="bg-particle" style="top:20%; left:55%; --tx:160px; --ty:-50px; animation-delay:-24s;"></div>
        <div class="bg-particle" style="top:50%; left:20%; --tx:-120px; --ty:80px; animation-delay:-26s;"></div>
        <div class="bg-particle" style="top:85%; left:80%; --tx:110px; --ty:-100px; animation-delay:-28s;"></div>
        <div class="bg-particle" style="top:45%; left:65%; --tx:-90px; --ty:60px; animation-delay:-30s;"></div>
    </div>
    
    {% block content %}{% endblock %}
    
    <script>
        async function fetchAPI(url, options = {}) {
            try {
                const response = await fetch(url, options);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { error: 'خطا در ارتباط با سرور' };
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
